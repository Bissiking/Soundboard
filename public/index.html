<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMA Soundboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --border:     #30363d;
      --accent:     #5865f2;
      --accent-h:   #4752c4;
      --green:      #2ea043;
      --green-h:    #238636;
      --red:        #da3633;
      --red-h:      #b91c1c;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --radius:     8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.3px;
      flex: 1;
    }

    header h1 span { color: var(--accent); }

    #bot-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .85rem;
      color: var(--muted);
    }

    #bot-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--red);
      transition: background .3s;
      flex-shrink: 0;
    }

    #bot-dot.ready    { background: #f0a500; }
    #bot-dot.connected { background: var(--green); }

    #btn-connect {
      padding: 7px 18px;
      border-radius: var(--radius);
      border: none;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      background: var(--green);
      color: #fff;
    }

    #btn-connect:hover  { background: var(--green-h); }
    #btn-connect.active { background: var(--red); }
    #btn-connect.active:hover { background: var(--red-h); }
    #btn-connect:active { transform: scale(.97); }
    #btn-connect:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Tabs ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 4px;
    }

    .tab {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 500;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }

    .tab:hover  { color: var(--text); }
    .tab.active { color: var(--text); border-color: var(--accent); }

    /* ── Content ── */
    main { flex: 1; padding: 24px; max-width: 1100px; width: 100%; margin: 0 auto; }

    section { display: none; }
    section.active { display: block; }

    /* ── Sound grid ── */
    #sounds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .sound-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .15s, transform .15s;
      cursor: pointer;
    }

    .sound-card:hover  { border-color: var(--accent); transform: translateY(-2px); }
    .sound-card.playing { border-color: var(--accent); background: #1a1f35; }

    .sound-name {
      font-size: .9rem;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.3;
    }

    .sound-meta {
      font-size: .75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .btn-play {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background .15s;
    }

    .btn-play:hover    { background: var(--accent-h); }
    .btn-play.playing  { background: #374151; }

    .btn-play svg { width: 14px; height: 14px; fill: currentColor; }

    #empty-state {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: .95rem;
    }

    /* ── Upload form ── */
    #upload-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #upload-form h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .field input[type="text"],
    .field input[type="file"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .9rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }

    .field input[type="text"]:focus  { border-color: var(--accent); }
    .field input[type="file"]::file-selector-button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: .8rem;
      margin-right: 10px;
    }

    #progress-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .2s;
    }

    #btn-upload {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    #btn-upload:hover    { background: var(--accent-h); }
    #btn-upload:disabled { opacity: .5; cursor: not-allowed; }

    #upload-msg {
      font-size: .85rem;
      padding: 8px 12px;
      border-radius: var(--radius);
      display: none;
    }

    #upload-msg.ok    { background: #0d2818; color: #3fb950; display: block; }
    #upload-msg.error { background: #2c0b0b; color: #f85149; display: block; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: .875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 300px;
      z-index: 100;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <h1>LUMA <span>Soundboard</span></h1>
    <div id="bot-indicator">
      <div id="bot-dot"></div>
      <span id="bot-label">Hors ligne</span>
    </div>
    <button id="btn-connect">Connecter</button>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <button class="tab active" data-tab="soundboard">Soundboard</button>
    <button class="tab" data-tab="upload">Upload</button>
  </nav>

  <!-- ── Content ───────────────────────────────────────────── -->
  <main>
    <section id="tab-soundboard" class="active">
      <div id="sounds-grid"></div>
      <div id="empty-state" style="display:none">Aucun son disponible.</div>
    </section>

    <section id="tab-upload">
      <form id="upload-form" autocomplete="off">
        <h2>Ajouter un son</h2>

        <div class="field">
          <label for="f-name">Nom du son *</label>
          <input type="text" id="f-name" name="name" placeholder="ex: airhorn" required maxlength="100">
        </div>

        <div class="field">
          <label for="f-file">Fichier audio * (MP3 / WAV — max 1 MB, 10 s)</label>
          <input type="file" id="f-file" name="file" accept=".mp3,.wav,audio/mpeg,audio/wav" required>
        </div>

        <div class="field">
          <label for="f-author">Uploadé par</label>
          <input type="text" id="f-author" name="uploaded_by" placeholder="Votre pseudo" maxlength="100">
        </div>

        <div id="progress-wrap"><div id="progress-bar"></div></div>

        <button type="submit" id="btn-upload">Uploader</button>
        <p id="upload-msg"></p>
      </form>
    </section>
  </main>

  <div id="toast"></div>

  <script>
    /* ───────── Icons ───────── */
    const ICON_PLAY = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
    const ICON_STOP = `<svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>`;

    /* ───────── State ───────── */
    let currentCard     = null;
    let currentPlayTimer = null;
    let botConnected    = false;
    let statusInterval  = null;

    /* ───────── Tabs ───────── */
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
      });
    });

    /* ───────── Toast ───────── */
    let toastTimer;
    function toast(msg, color = 'var(--accent)') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.borderLeftColor = color;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    /* ───────── Bot status ───────── */
    async function fetchStatus() {
      try {
        const res  = await fetch('/api/bot/status', { cache: 'no-store' });
        const data = await res.json();

        const dot   = document.getElementById('bot-dot');
        const label = document.getElementById('bot-label');
        const btn   = document.getElementById('btn-connect');

        botConnected = data.connected;

        if (data.connected) {
          dot.className   = 'connected';
          label.textContent = `Connecté — #${data.channelName ?? data.channelId}`;
          btn.textContent = 'Déconnecter';
          btn.classList.add('active');
        } else if (data.botReady) {
          dot.className   = 'ready';
          label.textContent = 'Bot prêt';
          btn.textContent = 'Connecter';
          btn.classList.remove('active');
        } else {
          dot.className   = '';
          label.textContent = 'Hors ligne';
          btn.textContent = 'Connecter';
          btn.classList.remove('active');
        }

        btn.disabled = false;
      } catch {
        // silencieux — le serveur peut démarrer lentement
      }
    }

    fetchStatus();
    statusInterval = setInterval(fetchStatus, 5000);

    /* ───────── Connect / Disconnect ───────── */
    document.getElementById('btn-connect').addEventListener('click', async () => {
      const btn = document.getElementById('btn-connect');
      btn.disabled = true;

      try {
        if (botConnected) {
          await fetch('/api/bot/disconnect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
          toast('Bot déconnecté.');
        } else {
          const res  = await fetch('/api/bot/connect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
          const data = await res.json();
          if (!res.ok) { toast(data.error, 'var(--red)'); btn.disabled = false; return; }
          toast('Bot connecté !', 'var(--green)');
        }
        await fetchStatus();
      } catch (err) {
        toast('Erreur réseau.', 'var(--red)');
        btn.disabled = false;
      }
    });

    /* ───────── Load sounds ───────── */
    async function loadSounds() {
      const grid  = document.getElementById('sounds-grid');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';

      try {
        const res  = await fetch('/api/soundboard/list');
        const data = await res.json();

        if (!data.sounds?.length) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';

        data.sounds.forEach(sound => {
          const card = document.createElement('div');
          card.className   = 'sound-card';
          card.dataset.id  = sound.id;
          card.innerHTML   = `
            <div class="sound-name">${escHtml(sound.name)}</div>
            <div class="sound-meta">
              <span>${sound.duration.toFixed(1)}s</span>
              <span>▶ ${sound.plays_count}</span>
            </div>
            <button class="btn-play">${ICON_PLAY}<span>Play</span></button>
          `;

          card.querySelector('.btn-play').addEventListener('click', (e) => {
            e.stopPropagation();
            playSound(sound, card);
          });

          card.addEventListener('click', () => playSound(sound, card));
          grid.appendChild(card);
        });
      } catch (err) {
        empty.textContent = 'Erreur lors du chargement des sons.';
        empty.style.display = 'block';
      }
    }

    /* ───────── Play audio on Discord bot ───────── */
    async function playSound(sound, card) {
      if (currentCard && currentCard !== card) {
        resetCard(currentCard);
      }

      setCardPlaying(card, true);
      currentCard = card;
      clearTimeout(currentPlayTimer);

      try {
        const res = await fetch(`/api/soundboard/play/${sound.id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          resetCard(card);
          if (currentCard === card) currentCard = null;
          toast(data.error ?? 'Impossible de jouer le son via le bot.', 'var(--red)');
          return;
        }

        toast(`Lecture Discord: ${sound.name}`, 'var(--green)');

        const durationMs = Math.max(500, Math.round((sound.duration ?? 0) * 1000));
        currentPlayTimer = setTimeout(() => {
          if (currentCard === card) {
            resetCard(card);
            currentCard = null;
          }
        }, durationMs);
      } catch (_err) {
        resetCard(card);
        if (currentCard === card) currentCard = null;
        toast('Erreur réseau.', 'var(--red)');
      }
    }

    function setCardPlaying(card, playing) {
      const btn = card.querySelector('.btn-play');
      if (playing) {
        card.classList.add('playing');
        btn.classList.add('playing');
        btn.innerHTML = `${ICON_STOP}<span>Stop</span>`;
      } else {
        resetCard(card);
      }
    }

    function resetCard(card) {
      const btn = card.querySelector('.btn-play');
      card.classList.remove('playing');
      btn.classList.remove('playing');
      btn.innerHTML = `${ICON_PLAY}<span>Play</span>`;
    }

    /* ───────── Upload form ───────── */
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form    = e.target;
      const btn     = document.getElementById('btn-upload');
      const msg     = document.getElementById('upload-msg');
      const wrap    = document.getElementById('progress-wrap');
      const bar     = document.getElementById('progress-bar');
      const formData = new FormData(form);

      btn.disabled      = true;
      msg.className     = '';
      msg.style.display = 'none';
      wrap.style.display = 'block';
      bar.style.width   = '0%';

      try {
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', '/api/soundboard/upload');

          xhr.upload.addEventListener('progress', (ev) => {
            if (ev.lengthComputable) {
              bar.style.width = `${Math.round((ev.loaded / ev.total) * 100)}%`;
            }
          });

          xhr.addEventListener('load', () => {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status === 201) resolve(data);
            else reject(new Error(data.error ?? 'Erreur inconnue.'));
          });

          xhr.addEventListener('error', () => reject(new Error('Erreur réseau.')));
          xhr.send(formData);
        });

        bar.style.width   = '100%';
        msg.className     = 'ok';
        msg.textContent   = 'Son uploadé ! En attente de validation.';
        form.reset();
        toast('Son uploadé avec succès.', 'var(--green)');
      } catch (err) {
        msg.className   = 'error';
        msg.textContent = err.message;
        bar.style.width = '0%';
      }

      btn.disabled = false;
    });

    /* ───────── Utils ───────── */
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ───────── Init ───────── */
    loadSounds();
  </script>
</body>
</html>
